<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <title>Countdown Word Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Countdown</h1>

    <div class="glass">

      <!-- Letter selection -->
      <div class="controls">
        <button id="vowel-btn">Vowel</button>
        <button id="consonant-btn">Consonant</button>
      </div>

      <!-- Letter tiles -->
      <div id="letter-board"></div>
      
      <!-- Custom timer input -->
      <div class="controls">
        <label for="timer-input">Time (seconds):</label>
        <input type="number" id="timer-input" value="30" min="10" max="120" />
      </div>

      <!-- Timer -->
      <div id="timer">30</div>

      <!-- Timer controls -->
      <div class="controls">
        <button id="start-btn">Start</button>
        <button id="pause-btn">Pause</button>
        <button id="mute-btn">Mute</button>
        <button id="reset-btn">Reset</button>
      </div>

      <!-- Word input -->
      <div class="controls">
        <input type="text" id="player-word" placeholder="Type your word..." />
        <button id="submit-btn">Submit</button>
      </div>

      <!-- Feedback message (disappears after 2s) -->
      <div id="feedback"></div>

      <!-- Submitted words list (stays permanently) -->
      <div id="submitted-words"></div>

      <!-- Score -->
      <div id="score-display">Score: 0</div>

      <!-- Best words -->
      <button id="best-words-btn">Best Words</button>
      <div id="best-words-list"></div>

    </div>

    <a href="about.html">About this project →</a>

    <script src="script.js"></script>
  </body>
</html>

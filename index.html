<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Countdown Word Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
    <body>
    <h1>Countdown</h1>

    <div class="glass">
      <div class="controls">
        <button id="vowel-btn">Vowel</button>
        <button id="consonant-btn">Consonant</button>
      </div>

      <div id="letter-board"></div>

      <div id="timer">30</div>

      <div class="controls">
        <button id="start-btn">Start</button>
        <button id="pause-btn">Pause</button>
        <button id="mute-btn">Mute</button>
      </div>

      <div class="controls">
        <input type="text" id="player-word" placeholder="Type your word..." />
        <button id="submit-btn">Submit</button>
      </div>

      <button id="best-words-btn">Best Words</button>
      <div id="best-words-list"></div>
    </div>

    <a href="about.html">About this project →</a>

    <script src="script.js"></script>
    </body>
</html>

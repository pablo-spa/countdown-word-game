<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <title>Countdown Word Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
    <body>
    <h1>Countdown</h1>

    <div class="glass">
      <div class="controls">
        <button id="vowel-btn">Vowel</button>
        <button id="consonant-btn">Consonant</button>
      </div>

      <div id="letter-board"></div>

      <div id="timer">30</div>

      <div class="controls">
        <button id="start-btn">Start</button>
        <button id="pause-btn">Pause</button>
        <button id="mute-btn">Mute</button>
        <button id="reset-btn">Reset</button>
      </div>

      <div class="controls">
        <input type="text" id="player-word" placeholder="Type your word..." />
        <button id="submit-btn">Submit</button>
        <div id="feedback"></div>
        <div id="submitted-words"></div>
      </div>

      <button id="best-words-btn">Best Words</button>
      <div id="best-words-list"></div>
      
      <div id="score-display">Score: 0</div>
    </div>

    <a href="about.html">About this project →</a>

    <script src="script.js"></script>
    </body>
</html>

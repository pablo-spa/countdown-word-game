<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <title>Countdown Word Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <nav>
      <a href="index.html">Game</a>
      <a href="about.html">About</a>
    </nav>

    <h1>Countdown</h1>

    <div class="glass">

      <!-- Letter selection -->
      <div class="controls">
        <button id="vowel-btn">Vowel</button>
        <button id="consonant-btn">Consonant</button>
        <button id="quickstart-btn">Quickstart</button>
      </div>

      <!-- Letter tiles -->
      <div id="letter-board"></div>

      <!-- Custom timer input -->
      <div class="controls">
        <label for="timer-input">Time (seconds):</label>
        <input type="number" id="timer-input" value="30" min="10" max="300" placeholder="30" />
      </div>

      <!-- Timer -->
      <div id="timer">30</div>

      <!-- Timer controls -->
      <div class="controls">
        <button id="start-btn">Start</button>
        <button id="pause-btn">Pause</button>
        <button id="mute-btn">Mute</button>
        <button id="reset-btn">Reset</button>
      </div>

      <!-- Word input -->
      <div class="controls">
        <input type="text" id="player-word" placeholder="Type your word..." />
        <button id="submit-btn">Submit</button>
      </div>

      <!-- Feedback message -->
      <div id="feedback"></div>

      <!-- Bottom row: submitted words + score + best words side by side -->
      <div class="bottom-row">
        <div class="bottom-col">
          <div class="col-label">submitted</div>
          <div id="submitted-words"></div>
        </div>
        <div class="bottom-col">
          <div class="col-label">best words</div>
          <div id="best-words-list"></div>
          <button id="best-words-btn">Show</button>
        </div>
        <div class="bottom-col center">
          <div class="col-label">score</div>
          <div id="score-display">0</div>
        </div>
      </div>

    </div>

    <script src="script.js"></script>
  </body>
</html>

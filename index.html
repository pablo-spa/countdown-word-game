<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Countdown Word Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <h1>Countdown</h1>

    <!-- Letter selection buttons -->
    <div class="controls">
      <button id="vowel-btn">Vowel</button>
      <button id="consonant-btn">Consonant</button>
    </div>

    <!-- The 9 letter tiles -->
    <div id="letter-board">
      <!-- tiles will appear here via JS -->
    </div>

    <!-- Timer -->
    <div id="timer">30</div>
    <button id="start-btn">Start Timer</button>

    <!-- Player input -->
    <input type="text" id="player-word" placeholder="Type your word..." />
    <button id="submit-btn">Submit</button>

    <!-- Best words reveal -->
    <button id="best-words-btn">Best Words</button>
    <div id="best-words-list"></div>

    <script src="script.js"></script>
  </body>
</html>
